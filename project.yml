name: MedSync
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_ASSET_PATHS: "\"MedSync/Preview Content\""
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    exactVersion: 1.25.1
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    exactVersion: 1.11.0
  IdentifiedCollections:
    url: https://github.com/pointfreeco/swift-identified-collections
    exactVersion: 1.1.1
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    exactVersion: 1.7.2
  Perception:
    url: https://github.com/pointfreeco/swift-perception
    exactVersion: 2.0.9
targets:
  MedSync:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MedSync
        excludes:
          - Resources/Assets.xcassets/**/.DS_Store
    resources:
      - path: MedSync/Resources/Assets.xcassets
    dependencies:
      - package: ComposableArchitecture
      - package: Dependencies
      - package: IdentifiedCollections
      - package: CasePaths
      - package: Perception
      - package: Perception
        product: PerceptionCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.MedSync
        PRODUCT_NAME: MedSync
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MedSync/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: MedSync/Resources/MedSync.entitlements
  MedSyncTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MedSyncTests
    dependencies:
      - target: MedSync
      - package: ComposableArchitecture
      - package: Dependencies
      - package: IdentifiedCollections
      - package: CasePaths
      - package: Perception
      - package: Perception
        product: PerceptionCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.MedSyncTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MedSync
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MedSync.app/MedSync"
        BUNDLE_LOADER: "$(TEST_HOST)"
  MedSyncUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: MedSyncUITests
    dependencies:
      - target: MedSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.MedSyncUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MedSync
schemes:
  MedSync:
    build:
      targets:
        MedSync: all
        MedSyncTests:
          - test
        MedSyncUITests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: MedSyncTests
        - name: MedSyncUITests
  MedSyncTests:
    build:
      targets:
        MedSync:
          - test
        MedSyncTests:
          - test
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: MedSyncTests
